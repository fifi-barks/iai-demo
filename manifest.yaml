# Platform Manifest — payments service, v2 (AWS + GCP)
# Why: staging environment for the payments service: EC2 app compute tier on AWS,
# and GCS export-storage bucket on GCP. Demonstrates multi-cloud provisioning,
# security scanning, cost estimation, and criticality-based state snapshots.
# Greenfield provisioning via OpenTofu.
#
# Auto-update note: agent rewrites only `state:` blocks after apply.
# All other fields and comments are human-owned. Library: ruamel.yaml.

manifest_version: "1"

environments:

  staging:
    # Why: isolated staging environment for payments service.
    engine: opentofu
    clouds: [aws, gcp]
    regions:
      aws: ap-southeast-5      # Kuala Lumpur, Malaysia
      gcp: asia-southeast1     # Singapore
    tags:
      environment: staging
      owner: payments-team

    resources:

      app-tier:
        # Why: compute tier serving the payments API (EC2, default VPC, public subnet).
        # Security gate will flag 0.0.0.0/0 inbound — intentional demo of CKV_AWS_24.
        # IMDSv2 is enforced (http_tokens = required); gate confirms this passes CKV_AWS_79.
        cloud: aws
        type: aws_instance
        criticality: critical
        depends_on: []
        # Agent-maintained — do not edit:
        state:
          status: pending        # pending | applied | failed
          resource_id: ~         # e.g. i-0abc1234 after apply
          last_applied: ~

      export-bucket:
        # Why: GCS bucket for payment export files. High (not critical) — read-heavy,
        # no transaction data. Uniform bucket-level access is enforced (CKV_GCP_29 passes).
        # Naming convention: iai-export-{environment}. Declared here so the name is
        # visible and auditable from the manifest, not buried in the generator.
        name: iai-export-staging
        cloud: gcp
        type: google_storage_bucket
        criticality: high
        depends_on: []
        # Agent-maintained — do not edit:
        state:
          status: pending
          resource_id: ~         # e.g. iai-export-staging after apply
          last_applied: ~

  edge-network:
    # Out of scope for v1 — physical network provisioning via Ansible.
    # Included as a manifest stub to demonstrate multi-engine support.
    engine: ansible
    scope: out-of-scope-v1
