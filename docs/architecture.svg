<svg viewBox="0 0 1040 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f3a5f"/>
    </marker>
    <style>
      .t { font-size:20px; font-weight:700; fill:#1f3a5f; }
      .st { font-size:12.5px; fill:#5b6b82; }
      .lyr { font-size:15px; font-weight:700; fill:#1f3a5f; }
      .ls { font-size:11px; fill:#5b6b82; }
      .chip { font-size:12px; font-weight:700; fill:#1f3a5f; }
      .cs { font-size:11px; fill:#41526b; }
      .pill { font-size:9.5px; font-weight:700; }
      .note { font-size:11px; fill:#8693a6; }
      .flow { stroke:#1f3a5f; stroke-width:2; fill:none; }
      .tool { font-weight:700; }
    </style>
  </defs>

  <text x="520" y="36" text-anchor="middle" class="t">Infrastructure as Intent — Demo Architecture</text>
  <text x="520" y="58" text-anchor="middle" class="st">Payments staging across AWS + GCP · keyless · v1</text>

  <!-- LEFT: human + interfaces -->
  <rect x="40" y="108" width="164" height="46" rx="8" fill="#ffffff" stroke="#1f3a5f" stroke-width="2"/>
  <text x="122" y="136" text-anchor="middle" class="chip">Human (El)</text>
  <line x1="122" y1="154" x2="122" y2="176" class="flow" marker-end="url(#arr)"/>

  <rect x="28" y="178" width="188" height="124" rx="10" fill="#f6f8fc" stroke="#d7e0ec"/>
  <rect x="42" y="192" width="160" height="46" rx="8" fill="#1f3a5f"/>
  <text x="122" y="212" text-anchor="middle" class="pill" fill="#cfe0ff" font-size="12">Telegram bot</text>
  <text x="122" y="227" text-anchor="middle" class="cs" fill="#cfe0ff">intent in · card out</text>
  <rect x="42" y="244" width="160" height="46" rx="8" fill="#0f766e"/>
  <text x="122" y="264" text-anchor="middle" class="pill" fill="#ccfbf1" font-size="12">CLI · run_intent.py</text>
  <text x="122" y="279" text-anchor="middle" class="cs" fill="#ccfbf1">intent in · card out</text>

  <line x1="216" y1="240" x2="252" y2="240" class="flow" marker-end="url(#arr)"/>

  <!-- MIDDLE: agent -->
  <rect x="252" y="92" width="416" height="486" rx="12" fill="#eef4ff" stroke="#1f3a5f" stroke-width="2.5"/>
  <text x="270" y="118" class="lyr">Intent Agent</text>
  <text x="270" y="134" class="ls">AWS EC2 VM · ap-southeast-5</text>
  <rect x="566" y="100" width="86" height="22" rx="11" fill="#1f3a5f"/>
  <text x="609" y="115" text-anchor="middle" class="pill" fill="#cfe0ff">KEYLESS</text>

  <!-- manifest -->
  <rect x="270" y="148" width="380" height="36" rx="6" fill="#fbf6e9" stroke="#9a7b2f" stroke-width="1.3"/>
  <text x="460" y="164" text-anchor="middle" class="chip" fill="#9a7b2f">Platform Manifest</text>
  <text x="460" y="177" text-anchor="middle" class="cs">annotated YAML · self-updating source of truth</text>

  <!-- 1 parse intent (AI step, indigo accent) -->
  <rect x="270" y="190" width="380" height="32" rx="6" fill="#eef0fb" stroke="#5b5bd6" stroke-width="1.8"/>
  <text x="283" y="210" class="chip">1 · Parse intent · <tspan class="tool" fill="#4338ca">LLM (Groq)</tspan></text>
  <rect x="566" y="197" width="74" height="18" rx="9" fill="#5b5bd6"/>
  <text x="603" y="209.5" text-anchor="middle" class="pill" fill="#ffffff" font-size="8.5">sub-second</text>

  <!-- 2 read -->
  <rect x="270" y="228" width="380" height="30" rx="6" fill="#ffffff" stroke="#2f5fa0" stroke-width="1.3"/>
  <text x="283" y="247" class="chip">2 · Read manifest</text>

  <!-- 3 generate -->
  <rect x="270" y="264" width="380" height="30" rx="6" fill="#ffffff" stroke="#2f5fa0" stroke-width="1.3"/>
  <text x="283" y="283" class="chip">3 · Generate IaC · <tspan class="tool">OpenTofu</tspan></text>

  <!-- 4 gates (emphasized) -->
  <rect x="270" y="300" width="380" height="104" rx="8" fill="#eef7ef" stroke="#2e7d4f" stroke-width="2.5"/>
  <text x="283" y="320" class="chip" font-size="13">4 · Validate · three gates</text>

  <rect x="286" y="328" width="348" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="292" y="332" width="52" height="14" rx="7" fill="#1f3a5f"/>
  <text x="318" y="342.5" text-anchor="middle" class="pill" fill="#ffffff" font-size="8.5">PLAN</text>
  <text x="352" y="343" class="cs"><tspan class="tool">OpenTofu</tspan></text>

  <rect x="286" y="354" width="348" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="292" y="358" width="52" height="14" rx="7" fill="#7c3aed"/>
  <text x="318" y="368.5" text-anchor="middle" class="pill" fill="#ffffff" font-size="8.5">SEC</text>
  <text x="352" y="369" class="cs"><tspan class="tool" fill="#5b21b6">Checkov + Trivy</tspan></text>

  <rect x="286" y="380" width="348" height="22" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="292" y="384" width="52" height="14" rx="7" fill="#16864a"/>
  <text x="318" y="394.5" text-anchor="middle" class="pill" fill="#ffffff" font-size="8.5">COST</text>
  <text x="352" y="395" class="cs"><tspan class="tool" fill="#0f6b39">Infracost</tspan></text>

  <!-- policy as code -->
  <rect x="270" y="412" width="380" height="40" rx="6" fill="#fff7e6" stroke="#b8860b" stroke-width="1.3"/>
  <text x="283" y="436" class="chip" font-size="11" fill="#8a6d1a">Policy as Code</text>
  <rect x="372" y="423" width="84" height="18" rx="9" fill="#fdecc8"/>
  <text x="414" y="435.5" text-anchor="middle" class="pill" fill="#7a5e12" font-size="8.5">Security rules</text>
  <rect x="462" y="423" width="96" height="18" rx="9" fill="#fdecc8"/>
  <text x="510" y="435.5" text-anchor="middle" class="pill" fill="#7a5e12" font-size="8.5">Budget threshold</text>
  <rect x="564" y="423" width="80" height="18" rx="9" fill="#fdecc8"/>
  <text x="604" y="435.5" text-anchor="middle" class="pill" fill="#7a5e12" font-size="8.5">Tag policy</text>

  <!-- 5 synthesise -->
  <rect x="270" y="460" width="380" height="30" rx="6" fill="#ffffff" stroke="#2f5fa0" stroke-width="1.3"/>
  <text x="283" y="479" class="chip">5 · Synthesise approval card</text>

  <!-- approve -->
  <rect x="270" y="498" width="380" height="30" rx="15" fill="#16864a"/>
  <text x="460" y="517" text-anchor="middle" class="pill" fill="#ffffff" font-size="11">Approve · Telegram / CLI</text>

  <!-- 6 apply -->
  <rect x="270" y="536" width="380" height="30" rx="6" fill="#f4f7fb" stroke="#d7e0ec"/>
  <text x="460" y="555" text-anchor="middle" class="cs">6 · Snapshot → Apply</text>

  <!-- self-update loop -->
  <path d="M652,551 C666,551 666,166 652,166" class="flow" marker-end="url(#arr)"/>

  <!-- apply to clouds -->
  <line x1="668" y1="224" x2="730" y2="224" class="flow" marker-end="url(#arr)"/>
  <line x1="668" y1="420" x2="730" y2="420" class="flow" marker-end="url(#arr)"/>

  <!-- RIGHT: AWS -->
  <rect x="732" y="150" width="276" height="148" rx="10" fill="#ffffff" stroke="#1f3a5f" stroke-width="2"/>
  <text x="752" y="176" class="chip" font-size="13">AWS · ap-southeast-5</text>
  <rect x="752" y="188" width="236" height="28" rx="5" fill="#eef4ff"/>
  <text x="870" y="206" text-anchor="middle" class="cs">EC2 instance · t3.micro</text>
  <rect x="752" y="222" width="236" height="28" rx="5" fill="#eef4ff"/>
  <text x="870" y="240" text-anchor="middle" class="cs">Security group · ingress restricted</text>
  <rect x="752" y="262" width="236" height="24" rx="12" fill="#1f3a5f"/>
  <text x="870" y="278" text-anchor="middle" class="pill" fill="#cfe0ff">EC2 instance role · keyless</text>

  <!-- RIGHT: GCP -->
  <rect x="732" y="360" width="276" height="124" rx="10" fill="#ffffff" stroke="#1f3a5f" stroke-width="2"/>
  <text x="752" y="386" class="chip" font-size="13">GCP · asia-southeast1</text>
  <rect x="752" y="398" width="236" height="28" rx="5" fill="#f3edfb"/>
  <text x="870" y="416" text-anchor="middle" class="cs">Cloud Storage bucket · exports</text>
  <rect x="752" y="438" width="236" height="24" rx="12" fill="#7c3aed"/>
  <text x="870" y="454" text-anchor="middle" class="pill" fill="#ffffff">Workload Identity Federation · keyless</text>

  <!-- footer -->
  <text x="520" y="648" text-anchor="middle" class="note">3 resources · one human approval · keyless end to end — no static credentials</text>
  <text x="520" y="674" text-anchor="middle" class="chip" font-size="11">© Elaia Raj — Infrastructure as Intent</text>
</svg>
